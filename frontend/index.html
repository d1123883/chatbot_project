<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced AI Chatbot</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Sidebar for History -->
        <aside class="sidebar">
            <button id="new-chat-btn">+ New Chat</button>
            <div id="session-list">
                <!-- Sessions will be loaded here -->
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-area">
            <header>
                <h1 id="current-chat-title">Select a chat</h1>
                <div class="controls">
                    <button id="regenerate-btn" disabled>Regenerate</button>
                    <button id="abort-btn" disabled>Stop</button>
                </div>
            </header>

            <div id="chat-messages">
                <!-- Messages will appear here -->
            </div>

            <div class="input-area">
                <div class="upload-preview" id="upload-preview"></div>
                <div class="input-container">
                    <input type="file" id="file-input" hidden>
                    <button id="attach-btn">📎</button>
                    <textarea id="user-input" placeholder="Type a message..." rows="1"></textarea>
                    <button id="send-btn">Send</button>
                </div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
